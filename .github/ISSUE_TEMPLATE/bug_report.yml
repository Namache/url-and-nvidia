name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Run `./setup.sh`
        2. Then...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error output.
    validations:
      required: true

  - type: input
    id: bazzite-version
    attributes:
      label: Bazzite version
      description: Output of `rpm-ostree status | head -5` or `cat /etc/os-release | grep VERSION`
    validations:
      required: false

  - type: dropdown
    id: container-state
    attributes:
      label: Container state
      description: Was the container already created or is this a fresh install?
      options:
        - Fresh install (container did not exist)
        - Re-run on existing container
        - Not sure
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Include any relevant output. The launcher log is at:
        `~/.cache/claude-desktop-debian/launcher.log`
      render: shell
    validations:
      required: false
