name: Feature request
description: Suggest something new
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this feature would help.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the feature do, and how should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be useful.
    validations:
      required: false
